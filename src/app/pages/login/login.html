<div class="min-h-screen bg-[#ECE7DC] flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="flex items-center justify-center gap-2 mb-8">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" class="text-[#3F6B52]">
        <path d="M12 2L21 7V17L12 22L3 17V7L12 2Z" stroke="currentColor" stroke-width="1.6"/>
        <path d="M12 2V22M3 7L12 12L21 7" stroke="currentColor" stroke-width="1.6"/>
      </svg>
      <span class="font-display font-bold text-[#24262B] text-lg tracking-[0.08em] uppercase">Inventory</span>
    </div>

    <form (ngSubmit)="onSubmit()" class="bg-[#F7F3E9] border border-[#CFC6B3] p-8 rounded-md">
      <p class="font-data text-[10px] text-[#6B6759] tracking-[0.15em] uppercase mb-1">Acceso</p>
      <h1 class="text-xl font-display font-bold text-[#24262B] mb-6">Entra a tu inventario</h1>

      @if (error()) {
        <p class="bg-[#B5651D]/10 border border-[#B5651D]/30 text-[#B5651D] text-sm p-3 rounded mb-4">
          {{ error() }}
        </p>
      }

      <div class="mb-4">
        <label class="block text-[#6B6759] text-xs font-data uppercase tracking-wide mb-1.5">Email</label>
        <input type="email" name="email" [(ngModel)]="email" required
          class="w-full px-3 py-2.5 rounded bg-[#ECE7DC] border border-[#CFC6B3] text-[#24262B] text-sm outline-none focus:ring-1 focus:ring-[#3F6B52] transition" />
      </div>

      <div class="mb-6">
        <label class="block text-[#6B6759] text-xs font-data uppercase tracking-wide mb-1.5">Contraseña</label>
        <input type="password" name="password" [(ngModel)]="password" required
          class="w-full px-3 py-2.5 rounded bg-[#ECE7DC] border border-[#CFC6B3] text-[#24262B] text-sm outline-none focus:ring-1 focus:ring-[#3F6B52] transition" />
      </div>

      <button type="submit" [disabled]="loading()"
        class="w-full bg-[#3F6B52] hover:bg-[#345A44] text-white font-semibold py-2.5 rounded transition disabled:opacity-50">
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>

      <p class="text-[#6B6759] text-sm text-center mt-6">
        ¿No tienes cuenta?
        <a routerLink="/register" class="text-[#3F6B52] hover:text-[#345A44] font-semibold">Regístrate</a>
      </p>
    </form>
  </div>
</div>
